<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Freelance Offer Analyzer</title>
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    .field-label {
      font-size: 0.875rem;
      color: #6b7280; /* gray-500 */
      margin-bottom: 0.25rem;
      display: block;
    }
  </style>
</head>

<body class="bg-[#f5f5f7] min-h-screen">
<div class="max-w-6xl mx-auto px-6 py-12">

<header class="text-center mb-12">
  <h1 class="text-3xl font-semibold">Freelance Offer Analyzer</h1>
  <p class="text-gray-500 mt-2">Make confident decisions</p>
</header>

<div class="grid md:grid-cols-2 gap-10">

<!-- FORM -->
<section class="bg-white p-8 rounded-2xl shadow-sm">
<form id="jobForm" class="space-y-4">

  <div>
    <label class="field-label">Project type</label>
    <input id="job_type" class="input" placeholder="e.g. Landing page" />
  </div>

  <div>
    <label class="field-label">Estimated hours</label>
    <input id="hours" class="input" placeholder="e.g. 20" />
  </div>

  <div>
    <label class="field-label">Total project budget ($)</label>
    <input id="price" class="input" placeholder="e.g. 800" />
  </div>

  <div>
    <label class="field-label">Preferred hourly rate range ($ / hour)</label>
    <div class="grid grid-cols-2 gap-3">
      <input id="ideal_rate_min" class="input" placeholder="Min (e.g. 40)" />
      <input id="ideal_rate_max" class="input" placeholder="Max (e.g. 80)" />
    </div>
  </div>

  <div>
    <label class="field-label">Client type</label>
    <select id="client_type" class="input">
      <option>startup</option>
      <option>early-stage startup</option>
      <option>small business</option>
      <option>agency</option>
      <option>solo founder</option>
      <option>enterprise</option>
      <option>corporate</option>
      <option>non-profit</option>
      <option>individual client</option>
      <option>other</option>
    </select>
  </div>

  <div>
    <label class="field-label">Revision policy</label>
    <input id="revisions" class="input" placeholder="e.g. 2 rounds or unlimited" />
  </div>

  <div>
    <label class="field-label">Your experience level</label>
    <input id="experience_level" class="input" placeholder="junior / mid / expert" />
  </div>

  <div>
    <label class="field-label">Client message (optional)</label>
    <textarea
      id="client_message"
      rows="4"
      class="input"
      placeholder="Paste the client’s message here"></textarea>
  </div>

  <button class="w-full bg-black text-white py-2 rounded-xl">
    Analyze offer
  </button>

</form>
</section>

<!-- RESULTS -->
<section class="space-y-4">

<div id="loadingState" class="hidden text-center py-12">
  <div class="animate-spin h-10 w-10 border-4 border-black border-t-transparent rounded-full mx-auto"></div>
  <p class="text-gray-500 mt-4">
    Analyzing offer… This may take a few seconds.
  </p>
</div>

<div id="decisionCard" class="card"></div>
<div id="scoreCard" class="card"></div>
<div id="rateCard" class="card"></div>
<div id="riskCard" class="card"></div>
<div id="confidenceCard" class="card"></div>
<div id="simulatorCard" class="card hidden"></div>
<div id="acceptanceCard" class="card hidden"></div>
<div id="historyCard" class="card"></div>
<div id="aiCard" class="card"></div>

<button id="downloadPdfBtn"
  class="hidden w-full bg-gray-900 text-white py-2 rounded-xl">
Export PDF
</button>

</section>
</div>
</div>

<script>
document.querySelectorAll(".input").forEach(i =>
  i.classList.add("w-full","border","rounded-xl","px-4","py-2")
);
document.querySelectorAll(".card").forEach(c =>
  c.classList.add("bg-white","rounded-2xl","shadow-sm","p-6")
);
</script>

<script src="app.js"></script>
</body>
</html>
